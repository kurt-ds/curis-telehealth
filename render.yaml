# render.yaml — Render Blueprint for Curis Telehealth
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─────────────────────────── BACKEND ─────────────────────────────
  - type: web
    name: curis-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: "sh -c 'npx prisma db push --accept-data-loss && npx prisma db seed && node dist/index.js'"
    buildTarget: production
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: curis-postgres
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false          # You'll paste this in the Render dashboard
      - key: LLM_PROVIDER
        value: gemini

  # ─────────────────────────── FRONTEND ────────────────────────────
  - type: web
    name: curis-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    buildTarget: production
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: curis-backend
          type: web
          property: host
          envVarKey: NEXT_PUBLIC_API_URL
      - key: NEXT_PUBLIC_API_URL
        value: https://curis-backend.onrender.com   # update after backend deploys

databases:
  # ─────────────────────────── POSTGRES ────────────────────────────
  - name: curis-postgres
    plan: free
    databaseName: curisdb
    user: curis
