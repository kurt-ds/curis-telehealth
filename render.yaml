services:
  # ─────────────────────────── BACKEND ─────────────────────────────
  - type: web
    name: curis-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: curis-postgres
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: gemini

  # ─────────────────────────── FRONTEND ────────────────────────────
  - type: web
    name: curis-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: curis-backend
          type: web
          property: host

databases:
  # ─────────────────────────── POSTGRES ────────────────────────────
  - name: curis-postgres
    plan: free
    databaseName: curisdb
    user: curis
